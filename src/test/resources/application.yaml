# Configurações específicas para o ambiente de testes (CI)
# Substitui o application.yaml principal durante a execução de 'mvn test'

spring:
  datasource:
    url: jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    database-platform: org.hibernate.dialect.H2Dialect
    hibernate:
      ddl-auto: create-drop

  flyway:
    enabled: false

  data:
    redis:
      host: localhost
      port: 6379

  docker:
    compose:
      enabled: false

jwt:
  private:
    key: file:certs/app.key
  public:
    key: file:certs/app.pub
  access-token:
    expiration-seconds: 300
  refresh-token:
    expiration-seconds: 86400
