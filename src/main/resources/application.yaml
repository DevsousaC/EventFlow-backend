spring:
  application:
    name: api
  flyway:
    enabled: true
    baseline-on-migrate: true
    locations: classpath:db/migration

  docker:
    compose:
      file: compose.dev.yaml
      lifecycle-management: start-only

jwt:
  private:
    key: ${JWT_PRIVATE_KEY:file:certs/app.key}
  public:
    key: ${JWT_PUBLIC_KEY:file:certs/app.pub}